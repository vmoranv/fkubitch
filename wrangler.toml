name = "fuckubitch"
main = "src/worker/index.ts"
compatibility_date = "2024-12-01"

[[d1_databases]]
binding = "DB"
database_name = "fuckubitch-db"
database_id = "local-dev"

[vars]
ENVIRONMENT = "development"
CORS_ORIGIN = "http://localhost:5173"
JWT_SECRET = "dev-secret-do-not-use-in-production-12345678"
GITHUB_CLIENT_ID = "dev"
GITHUB_CLIENT_SECRET = "dev"
GOOGLE_CLIENT_ID = "dev"
GOOGLE_CLIENT_SECRET = "dev"
TURNSTILE_SECRET_KEY = "1x0000000000000000000000000000000"
ADMIN_API_KEY = "dev-admin-key"
